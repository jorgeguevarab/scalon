name: Send habit reminders

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call send-reminders endpoint
        run: |
          curl -sf -X GET "${{ secrets.APP_URL }}/api/send-reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
